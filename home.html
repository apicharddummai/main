<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ยินดีต้อนรับ - EMS UBON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; overflow: hidden; }
        
        .bg-container {
            position: relative;
            height: 100vh;
            width: 100%;
            background-color: #000; /* กันภาพโหลดไม่ทันให้เป็นสีดำไว้ก่อน */
        }

        /* ส่วนควบคุมรูปพื้นหลังให้เป็นขาวดำ */
        .bg-image {
            position: absolute;
            inset: 0;
            background-image: url('https://i.postimg.cc/0jPpvdKK/10000.png');
            background-size: cover;
            background-position: center right;
            filter: grayscale(100%); /* เปลี่ยนรูปเป็นขาวดำ 100% */
            z-index: 1;
        }

        /* แผ่นสีขุ่นถมทับเพื่อให้ตัวหนังสือเด่น */
        .bg-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(20, 20, 20, 0.7), rgba(0, 0, 0, 0.85));
            z-index: 2;
        }

        .content-layer {
            position: relative;
            z-index: 3;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .hover-shine:hover {
            box-shadow: 0 0 20px rgba(184, 134, 11, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="m-0 p-0">

    <div class="bg-container">
        <div class="bg-image"></div>
        <div class="bg-overlay"></div>

        <div class="content-layer p-10 md:p-16">
            
            <div class="flex flex-row items-center space-x-4 md:space-x-6 animate-fade-in">
                <div class="flex items-center space-x-3 md:space-x-4">
                    <img src="https://i.postimg.cc/g0JDzFrV/xbc.png" alt="Logo-อบจ.อุบล" class="h-16 md:h-24 drop-shadow-2xl">
                    <img src="https://i.postimg.cc/tgMz7SVd/sphch.png" alt="สพฉ" class="h-16 md:h-24 drop-shadow-2xl">
                </div>
                
                <div class="border-l-2 border-amber-500/50 pl-4 md:pl-6">
                    <h1 class="text-white text-xl md:text-3xl font-bold leading-tight drop-shadow-lg">
                        ศูนย์รับแจ้งเหตุและสั่งการ จังหวัดอุบลราชธานี
                    </h1>
                    <p class="text-gray-400 text-xs md:text-sm mt-1 font-light tracking-widest uppercase italic">
                        EMERGENCY MEDICAL SERVICES UBONRATCHATHANI
                    </p>
                </div>
            </div>

            <div class="flex justify-center w-full mb-10 md:mb-5">
                <a href="main.html" class="hover-shine group relative inline-flex items-center justify-center px-12 py-4 font-semibold text-white transition-all duration-300 bg-gray-800 border-2 border-gray-600 rounded-xl shadow-2xl overflow-hidden">
                    <span class="absolute inset-0 bg-white opacity-0 group-hover:opacity-10 transition-opacity"></span>
                    <span class="mr-3 text-lg text-gray-200">เข้าสู่เว็บไซต์</span>
                    <svg class="w-6 h-6 text-gray-400 transition-transform duration-300 group-hover:translate-x-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                    </svg>
                </a>
            </div>

        </div>
    </div>

</body>
</html>
