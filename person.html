<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โครงสร้างบุคลากร - ศูนย์รับแจ้งเหตุและสั่งการ 1669</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            background-color: #f1f5f9;
            overflow: hidden; 
        }
        .canvas-iframe {
            width: 100%;
            height: calc(100vh - 64px); 
            border: none;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #1e3a8a;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <nav class="h-16 bg-[#1e3a8a] flex items-center justify-between px-4 md:px-8 shadow-2xl z-50 relative">
        <div class="flex items-center gap-4">
            <a href="https://apicharddummai.github.io/main/" 
               class="flex items-center gap-2 bg-white text-blue-900 px-5 py-2 rounded-full transition-all hover:bg-blue-50 font-bold text-sm shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                กลับหน้าหลัก
            </a>
            <h1 class="text-white font-semibold text-sm md:text-lg hidden sm:block">
                โครงสร้างบุคลากร ศูนย์รับแจ้งเหตุและสั่งการจังหวัดอุบลราชธานี
            </h1>
        </div>
        
        <div class="hidden md:flex items-center bg-blue-800/50 px-3 py-1 rounded-full">
            <span class="text-blue-100 text-xs italic">
                * แนะนำ: กดปุ่มขยายที่มุมขวาล่างของภาพเพื่อดูแบบเต็มจอ
            </span>
        </div>
    </nav>

    <div class="relative w-full h-full bg-slate-200">
        <div id="loader-container" class="absolute inset-0 flex flex-col items-center justify-center bg-white z-0">
            <div class="spinner mb-3"></div>
            <p class="text-slate-500 text-sm">กำลังเปิดผังโครงสร้าง...</p>
        </div>

        <iframe 
            src="https://www.canva.com/design/DAGCULAGn4g/zlnOvljILONH59pPHzA4yA/view?embed" 
            class="canvas-iframe relative z-10" 
            allowfullscreen="allowfullscreen" 
            allow="fullscreen"
            onload="document.getElementById('loader-container').style.display='none';">
        </iframe>
    </div>

</body>
</html>
