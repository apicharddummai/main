<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังเอกสาร - EMS 1669 Ubon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        .page-btn.active { background-color: #1e3a8a; color: white; border-color: #1e3a8a; }
        /* ซ่อน Scrollbar สำหรับ Chrome, Safari และ Opera */
        body::-webkit-scrollbar { display: none; }
    </style>
</head>
<body oncontextmenu="return false;"> <nav class="h-14 bg-[#1e3a8a] flex items-center justify-between px-4 shadow-md text-white sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="https://apicharddummai.github.io/main/" class="bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg transition text-xs font-bold border border-white/20">
                กลับสู้หน้าหลัก
            </a>
            <h1 class="font-medium text-sm hidden sm:block">เอกสารและแบบฟอร์ม ศูนย์รับแจ้งเหตุและสั่งการ จังหวัดอุบลราชธานี</h1>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-6">
        <div class="max-w-2xl mx-auto bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            
            <div class="mb-5">
                <h2 class="text-xl font-bold text-slate-800 mb-3 text-center text-blue-900">ดาวน์โหลดเอกสารและแบบฟอร์ม</h2>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </span>
                    <input type="text" id="searchInput" 
                           class="block w-full pl-9 pr-3 py-2 border border-slate-300 rounded-xl bg-slate-50 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm transition-all" 
                           placeholder="พิมพ์ชื่อเอกสารเพื่อค้นหา...">
                </div>
            </div>

            <div id="documentContainer" class="grid gap-2 min-h-[250px] content-start"></div>

            <div id="noResults" class="hidden text-center py-10 text-slate-400 text-sm italic">
                -- ไม่พบเอกสารที่ค้นหา --
            </div>

            <div id="paginationContainer" class="mt-6 flex justify-center items-center gap-1"></div>

        </div>
    </div>

    <script>
        // ==========================================
        // 1. ข้อมูลเอกสาร (ใส่ลิงก์ Google Drive ปกติได้เลย!)
        // ==========================================
        const allDocuments = [
            { title: "กำหนดการ โครงการอบรมฟื้นฟู ปี 2569", link: "https://drive.google.com/file/d/1ToqRXPcTo_hpx9W1XKRn7aE6c7R15Knu/view?usp=drive_link" },
            { title: "แบบตอบรับ โครงการอบรมฟื้นฟู ปี 2569", link: "https://drive.google.com/file/d/1Y002JUS3ka6QQEIE_P5mViIURaAA3LyV/view?usp=sharing" },
            { title: "หนังสือเชิญอบรม โครงการอบรมฟื้นฟู รุ่นที่ 1 ปี 2569", link: "https://drive.google.com/file/d/1SNzeKizBqv6MDDW23es07qsghn-eiVZf/view?usp=sharing" },
            { title: "หนังสือเชิญอบรม โครงการอบรมฟื้นฟู รุ่นที่ 2 ปี 2569", link: "https://drive.google.com/file/d/19Uy1DviE4Iwt3o7EA5Z3d-4EIOHdz0ch/view?usp=sharing" },
			{ title: "หนังสือเชิญอบรม โครงการอบรมฟื้นฟู รุ่นที่ 3 ปี 2569", link: "https://drive.google.com/file/d/1CSIxHnNUBBGC3kHdUPuymjSTXmR18pyg/view?usp=sharing" },
			{ title: "หนังสือเชิญอบรม โครงการอบรมฟื้นฟู รุ่นที่ 4 ปี 2569", link: "https://drive.google.com/file/d/1t9SkfmdE_xOwLojgVqc-Qa5PbWRnFtxj/view?usp=sharing" },
			{ title: "หนังสือเชิญอบรม โครงการอบรมฟื้นฟู รุ่นที่ 5 ปี 2569", link: "https://drive.google.com/file/d/12GQGCsQnxBGRFo0OZ_kMLPX9vSqL9y1v/view?usp=sharing" },
			{ title: "หนังสือเชิญอบรม โครงการอบรมฟื้นฟู รุ่นที่ 6 ปี 2569", link: "https://drive.google.com/file/d/1I29hBMxDAyjE350Wn8EZB0VpD5RSUyJm/view?usp=sharing" }
            
        ];

        // ฟังก์ชันแปลงลิงก์ Google Drive ให้เป็น Direct Download
        function getDirectLink(url) {
            if (url.includes('drive.google.com')) {
                const fileId = url.match(/\/d\/(.+?)\//);
                if (fileId && fileId[1]) {
                    return `https://drive.google.com/uc?export=download&id=${fileId[1]}`;
                }
            }
            return url;
        }

        let currentPage = 1;
        const rowsPerPage = 5; 
        let filteredDocuments = [...allDocuments];

        const container = document.getElementById('documentContainer');
        const paginationContainer = document.getElementById('paginationContainer');
        const searchInput = document.getElementById('searchInput');

        function renderDocuments(page) {
            container.innerHTML = '';
            page--;
            let start = rowsPerPage * page;
            let end = start + rowsPerPage;
            let paginatedItems = filteredDocuments.slice(start, end);

            if (paginatedItems.length === 0) {
                document.getElementById('noResults').classList.remove('hidden');
            } else {
                document.getElementById('noResults').classList.add('hidden');
                paginatedItems.forEach(doc => {
                    const directLink = getDirectLink(doc.link); // แปลงลิงก์ก่อนแสดงผล
                    // ค้นหาบรรทัดที่สร้าง card ในฟังก์ชัน renderDocuments แล้วเปลี่ยนเป็นชุดนี้ครับ
const card = `
    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 flex items-center justify-between hover:border-red-200 hover:bg-white transition-all group">
        <div class="flex items-center gap-3">
            <div class="bg-red-50 p-2 rounded-lg text-red-600 group-hover:scale-110 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6M9 17h3" />
                </svg>
            </div>
            <h3 class="font-medium text-slate-700 text-sm">${doc.title}</h3>
        </div>
        <a href="${directLink}" class="bg-red-600 hover:bg-red-800 text-white px-4 py-1.5 rounded-lg text-xs font-bold transition-all shadow-sm">
            ดาวน์โหลด
        </a>
    </div>
`;
                    container.innerHTML += card;
                });
            }
            renderPagination();
        }

        function renderPagination() {
            paginationContainer.innerHTML = '';
            let pageCount = Math.ceil(filteredDocuments.length / rowsPerPage);
            if(pageCount <= 1) return;

            for (let i = 1; i <= pageCount; i++) {
                let btn = document.createElement('button');
                btn.innerText = i;
                btn.classList.add('page-btn', 'w-8', 'h-8', 'border', 'rounded-lg', 'text-xs', 'font-bold', 'transition-all', 'bg-white', 'text-slate-600');
                if (currentPage === i) btn.classList.add('active');
                btn.onclick = () => { currentPage = i; renderDocuments(currentPage); window.scrollTo(0,0); };
                paginationContainer.appendChild(btn);
            }
        }

        searchInput.oninput = (e) => {
            const keyword = e.target.value.toLowerCase();
            filteredDocuments = allDocuments.filter(doc => doc.title.toLowerCase().includes(keyword));
            currentPage = 1;
            renderDocuments(currentPage);
        };

        // ==========================================
        // 2. ระบบป้องกันการก๊อปปี้และ View Source
        // ==========================================
        document.onkeydown = function(e) {
            // บล็อก F12
            if(e.keyCode == 123) return false;
            // บล็อก Ctrl+Shift+I, Ctrl+Shift+C, Ctrl+Shift+J (Inspect Element)
            if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            // บล็อก Ctrl+U (View Source)
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
            // บล็อก Ctrl+S (Save Page)
            if(e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) return false;
        };

        renderDocuments(currentPage);
    </script>

</body>
</html>
